# Logback Configuration for Campus Management System

# Root Logger
logging.level.root=INFO

# Application Logger
logging.level.com.collegeapp=DEBUG

# Database Logger
logging.level.com.mysql.cj=WARN

# Output format
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5p %c{1} - %m%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} %-5p %c{1} - %m%n

# Log file location
logging.file.name=logs/app.log
logging.file.max-size=10MB
logging.file.max-history=10
